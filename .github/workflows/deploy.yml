name: Deploy Railway

# Deploy automático no Railway só depois que toda a CI passa.
# Estratégia de branches:
#   • push em `main`     → deploy em PRODUCTION (juridflow.com.br)
#   • push em `develop`  → deploy em STAGING    (staging.juridflow.com.br)
#
# Pra mexer/debugar:
#   • Ver últimos deploys: aba "Deployments" do serviço no Railway
#   • Disparar manual sem push: botão "Run workflow" na aba Actions
#     (escolhe target=production ou staging)
#   • Logs de build: clica no run específico → "Deploy" → expande os steps
#
# Secrets necessárias (Settings > Secrets and variables > Actions):
#   RAILWAY_TOKEN                       → Account Token criado no Railway
#                                          (Account → Tokens). O CLI lê ele
#                                          via RAILWAY_API_TOKEN abaixo.
#   RAILWAY_PROJECT_ID                  → UUID do projeto (ambos environments
#                                          compartilham o mesmo projeto)
#
#   RAILWAY_SERVICE_ID_PRODUCTION       → UUID do service do app no env production
#   RAILWAY_ENVIRONMENT_ID_PRODUCTION   → UUID do environment "production"
#
#   RAILWAY_SERVICE_ID_STAGING          → UUID do service do app no env staging
#   RAILWAY_ENVIRONMENT_ID_STAGING      → UUID do environment "staging"
#
# Como achar os IDs no Railway:
#   • PROJECT_ID     → URL do projeto: railway.com/project/<PROJECT_ID>
#   • ENVIRONMENT_ID → seleciona o environment, abre o seletor de envs e
#                       passa o mouse / inspeciona; ou via Railway CLI
#                       `railway environment` mostra os IDs.
#   • SERVICE_ID     → clica no service, URL fica
#                       railway.com/project/<...>/service/<SERVICE_ID>?...
on:
  # Dispara DIRETO em push pra main/develop (sem esperar Tests CI).
  # Trade-off: deploy pode iniciar em paralelo com a CI da PR — mas
  # como push em main/develop só vem via squash de PR (que JÁ teve
  # CI verde), na prática o conteúdo já está validado. Branch
  # protection garante que push direto sem PR é bloqueado.
  # Speedup: economiza ~5min por PR mergeada vs esperar workflow_run.
  push:
    branches: [main, develop]

  # Permite disparar manualmente via UI do GitHub (Actions > Deploy Railway).
  # Útil pra re-deploy quando precisa, sem precisar fazer commit.
  workflow_dispatch:
    inputs:
      target:
        description: "Ambiente alvo"
        required: true
        type: choice
        options:
          - production
          - staging
        default: staging

# Cancela deploys antigos do MESMO ambiente. Production e staging têm grupos
# separados — uma rebuild de staging não cancela production em curso.
concurrency:
  group: >-
    deploy-railway-${{
      (github.event_name == 'push' && github.ref == 'refs/heads/main') && 'production' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') && 'staging' ||
      inputs.target
    }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Só roda em duas situações:
    #  1. Push em main (via squash merge de PR pra main) → deploy automático
    #  2. workflow_dispatch com target=production
    if: |
      (github.event_name == 'push' &&
        github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
        inputs.target == 'production')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Confirma autenticação
        # Account Token usa env var RAILWAY_API_TOKEN (Project Token usaria
        # RAILWAY_TOKEN). O secret no GitHub continua chamando RAILWAY_TOKEN
        # por compatibilidade — só o nome da var injetada muda.
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway whoami || {
            echo "::error::Falha ao autenticar com RAILWAY_TOKEN."
            exit 1
          }

      - name: Validar secrets do environment production
        env:
          PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID_PRODUCTION }}
        run: |
          if [ -z "$PROJECT_ID" ] || [ -z "$SERVICE_ID" ] || [ -z "$ENV_ID" ]; then
            echo "::error::Secrets RAILWAY_PROJECT_ID/SERVICE_ID_PRODUCTION/ENVIRONMENT_ID_PRODUCTION ausentes."
            exit 1
          fi

      - name: Linkar projeto Railway (production)
        # Account Token não escopa projeto — `railway up` falha com
        # "No linked project found" se o CWD não estiver linkado. `railway
        # link` cria o link local apontando pro project/env/service certos.
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID_PRODUCTION }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}"

      - name: Deploy production
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # `--detach` retorna assim que o deploy é DISPARADO (não espera
          # build terminar). Build do Jurify leva ~5min — esperar tudo
          # estoura o timeout do GitHub Actions sem necessidade.
          railway up \
            --service "${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID_PRODUCTION }}" \
            --detach

      - name: Resumo
        if: always()
        run: |
          echo "## Deploy production :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Acompanhe o build em [Railway → Deployments](https://railway.com/project/${{ secrets.RAILWAY_PROJECT_ID }}/service/${{ secrets.RAILWAY_SERVICE_ID_PRODUCTION }}?environmentId=${{ secrets.RAILWAY_ENVIRONMENT_ID_PRODUCTION }})" >> $GITHUB_STEP_SUMMARY

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'push' &&
        github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' &&
        inputs.target == 'staging')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Confirma autenticação
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway whoami || {
            echo "::error::Falha ao autenticar com RAILWAY_TOKEN."
            exit 1
          }

      - name: Validar secrets do environment staging
        env:
          PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID_STAGING }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}
        run: |
          if [ -z "$PROJECT_ID" ] || [ -z "$SERVICE_ID" ] || [ -z "$ENV_ID" ]; then
            echo "::error::Secrets RAILWAY_PROJECT_ID/SERVICE_ID_STAGING/ENVIRONMENT_ID_STAGING ausentes."
            exit 1
          fi

      - name: Linkar projeto Railway (staging)
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway link \
            --project "${{ secrets.RAILWAY_PROJECT_ID }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}" \
            --service "${{ secrets.RAILWAY_SERVICE_ID_STAGING }}"

      - name: Deploy staging
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service "${{ secrets.RAILWAY_SERVICE_ID_STAGING }}" \
            --environment "${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }}" \
            --detach

      - name: Resumo
        if: always()
        run: |
          echo "## Deploy staging :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Acompanhe o build em [Railway → Deployments](https://railway.com/project/${{ secrets.RAILWAY_PROJECT_ID }}/service/${{ secrets.RAILWAY_SERVICE_ID_STAGING }}?environmentId=${{ secrets.RAILWAY_ENVIRONMENT_ID_STAGING }})" >> $GITHUB_STEP_SUMMARY
