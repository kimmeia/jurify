name: Tests CI

# Roda em todo PR pra `main` ou `staging`. Falha bloqueia merge.
# 3 jobs sequenciais: unit (rápido) → smoke tRPC (DB local) → E2E.
on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  unit:
    name: Unit (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm check
      - name: Unit tests
        run: pnpm test

  smoke-trpc:
    name: Smoke tRPC (todas as procedures)
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jurify_smoke
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/jurify_smoke
      JWT_SECRET: smoke-test-jwt-secret-just-for-ci
      ENCRYPTION_KEY: smoke-test-encryption-key-32-chars
      NODE_ENV: test
      JURIFY_AMBIENTE: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              echo "MySQL up after ${i}s"
              break
            fi
            sleep 1
          done
      - name: Run migrations + seed
        run: |
          # Auto-migrate roda quando o app sobe — pra garantir que as tabelas
          # existem ANTES do smoke, sobe o app rapidamente em background pra
          # ele rodar as migrations, depois mata.
          pnpm dev &
          APP_PID=$!
          for i in {1..60}; do
            if curl -sf http://localhost:3000/api/health/live >/dev/null 2>&1; then
              echo "App up — migrations já rodaram"
              break
            fi
            sleep 1
          done
          kill $APP_PID 2>/dev/null || true
          # Seed (idempotente)
          pnpm tsx scripts/seed-staging.ts
      - name: Smoke tRPC
        run: pnpm test:smoke

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: smoke-trpc
    timeout-minutes: 20
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jurify_e2e
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/jurify_e2e
      JWT_SECRET: e2e-test-jwt-secret-just-for-ci
      ENCRYPTION_KEY: e2e-test-encryption-key-32-chars
      NODE_ENV: test
      JURIFY_AMBIENTE: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot -proot --silent; then
              break
            fi
            sleep 1
          done
      - name: Migrations + seed
        run: |
          pnpm dev &
          APP_PID=$!
          for i in {1..60}; do
            if curl -sf http://localhost:3000/api/health/live >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          kill $APP_PID 2>/dev/null || true
          sleep 2
          pnpm tsx scripts/seed-staging.ts
      - name: Run E2E (Playwright sobe pnpm dev sozinho)
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
