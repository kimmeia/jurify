    </radialGradient>
  </defs>
  <rect width="256" height="256" rx="56" fill="url(#cB-bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#cB-shine)"/>

  <!-- Curva S grossa conectando 2 pesos -->
  <path d="M70 76 Q70 128 128 128 Q186 128 186 180"
